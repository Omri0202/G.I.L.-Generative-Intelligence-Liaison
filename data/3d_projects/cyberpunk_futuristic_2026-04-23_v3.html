<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G.I.L. — 3D Studio · Cyberpunk Futuristic Robot With Glowing Joints And Armor Plating</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: radial-gradient(ellipse at center, #050510 0%, #020208 100%);
  overflow: hidden; font-family: 'Courier New', monospace; color:#fff;
}
canvas { display:block; }
#hud {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; flex-direction:column; align-items:center; pointer-events:none;
}
#title-bar {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:14px 28px; background:rgba(3,3,15,0.85);
  border-bottom:1px solid rgba(0,191,255,0.12);
}
#app-name {
  font-size:16px; font-weight:bold; letter-spacing:8px;
  color:#00BFFF; text-shadow:0 0 20px #00BFFF88;
}
#shape-label {
  font-size:22px; font-weight:bold; letter-spacing:5px; text-transform:uppercase;
  color:#00BFFF; text-shadow:0 0 40px #00BFFF;
  margin-top:20px;
}
#formula {
  margin-top:8px; font-size:12px; letter-spacing:2px;
  color:rgba(0,191,255,0.4); text-align:center;
}
#controls {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; gap:14px; z-index:10;
}
.btn {
  padding:10px 22px; border:1px solid rgba(0,191,255,0.35);
  background:rgba(0,10,20,0.8); color:#00BFFF;
  font-family:'Courier New',monospace; font-size:11px; font-weight:bold;
  letter-spacing:2px; cursor:pointer; border-radius:4px;
  transition:all 0.2s;
}
.btn:hover {
  background:rgba(0,191,255,0.15); box-shadow:0 0 20px rgba(0,191,255,0.3);
}
#hint {
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.1);
  text-transform:uppercase;
}
#variant-label {
  position:fixed; top:100px; right:30px;
  font-size:10px; color:rgba(0,191,255,0.3); text-align:right; letter-spacing:2px;
}
</style>
</head>
<body>

<div id="hud">
  <div id="title-bar">
    <span id="app-name">G . I . L .  —  3D STUDIO</span>
    <span style="color:rgba(0,191,255,0.3);font-size:10px;letter-spacing:3px">2026-04-23</span>
  </div>
  <div id="shape-label">Cyberpunk Futuristic Robot With Glowing Joints And Armor Plating</div>
  <div id="formula">Design variant 3  ·  AI generated by G.I.L.</div>
</div>

<div id="variant-label">DESIGN VARIANT<br>3 / 3</div>

<div id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-click to pan</div>
<div id="controls">
  <button class="btn" onclick="downloadPNG()">⬇  SAVE PNG</button>
  <button class="btn" onclick="toggleWireframe()">◈  WIREFRAME</button>
  <button class="btn" onclick="toggleRotation()">↻  PAUSE</button>
  <button class="btn" onclick="window.close()">✕  CLOSE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.028);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 1.4, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, preserveDrawingBuffer:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.autoRotate = true; controls.autoRotateSpeed = 1.4;
controls.minDistance = 1.5; controls.maxDistance = 18;

// ── Lighting ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x0a1a3a, 2.5);
scene.add(ambient);

const key = new THREE.DirectionalLight(0x4488ff, 3.5);
key.position.set(5, 8, 5); key.castShadow = true;
key.shadow.mapSize.setScalar(2048);
scene.add(key);

const fill = new THREE.PointLight(0x00bfff, 4, 20);
fill.position.set(-4, 2, -3);
scene.add(fill);

const rim = new THREE.PointLight(0x0044ff, 3, 15);
rim.position.set(0, -3, -5);
scene.add(rim);

const top = new THREE.PointLight(0x88ccff, 2, 12);
top.position.set(0, 8, 0);
scene.add(top);

// ── Grid ──────────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(16, 32, 0x0a1a3a, 0x050d1a);
grid.position.y = -2.2;
scene.add(grid);

// ── Ground reflection plane ───────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(16, 16);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x020510, metalness: 0.8, roughness: 0.2,
  transparent: true, opacity: 0.6
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -2.21;
ground.receiveShadow = true;
scene.add(ground);

// ── Particle field ────────────────────────────────────────────────────────────
const pGeo = new THREE.BufferGeometry();
const pN = 1200;
const pPos = new Float32Array(pN*3);
for (let i=0; i<pN; i++) {
  pPos[i*3]   = (Math.random()-0.5)*40;
  pPos[i*3+1] = (Math.random()-0.5)*40;
  pPos[i*3+2] = (Math.random()-0.5)*40;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
const pMat = new THREE.PointsMaterial({color:0x112244, size:0.06, transparent:true, opacity:0.7});
scene.add(new THREE.Points(pGeo, pMat));

// ── 3D Model (AI generated) ───────────────────────────────────────────────────
let model = null;
try {
  const model = new THREE.Group();

// Body
const body = new THREE.BoxGeometry(1.2, 0.8, 0.8);
const bodyMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x333333
});
const bodyMesh = new THREE.Mesh(body, bodyMaterial);
bodyMesh.position.set(0, -0.4, 0);
model.add(bodyMesh);

// Armor Plates
const plate1 = new THREE.BoxGeometry(0.4, 0.2, 0.1);
const plate1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const plate1Mesh = new THREE.Mesh(plate1, plate1Material);
plate1Mesh.position.set(-0.6, 0.2, -0.3);
model.add(plate1Mesh);

const plate2 = new THREE.BoxGeometry(0.4, 0.2, 0.1);
const plate2Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const plate2Mesh = new THREE.Mesh(plate2, plate2Material);
plate2Mesh.position.set(0.6, 0.2, -0.3);
model.add(plate2Mesh);

const plate3 = new THREE.BoxGeometry(0.2, 0.2, 0.1);
const plate3Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const plate3Mesh = new THREE.Mesh(plate3, plate3Material);
plate3Mesh.position.set(-0.2, -0.1, -0.4);
model.add(plate3Mesh);

const plate4 = new THREE.BoxGeometry(0.2, 0.2, 0.1);
const plate4Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const plate4Mesh = new THREE.Mesh(plate4, plate4Material);
plate4Mesh.position.set(0.2, -0.1, -0.4);
model.add(plate4Mesh);

// Head
const head = new THREE.BoxGeometry(0.6, 0.6, 0.6);
const headMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x444444
});
const headMesh = new THREE.Mesh(head, headMaterial);
headMesh.position.set(0, 0.8, 0);
model.add(headMesh);

// Visor
const visor = new THREE.CylinderGeometry(0.1, 0.1, 0.4, 32);
const visorMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const visorMesh = new THREE.Mesh(visor, visorMaterial);
visorMesh.position.set(0, 1.2, 0);
model.add(visorMesh);

// Eyes
const eye1 = new THREE.SphereGeometry(0.1, 32, 32);
const eye1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0xFFFFFF
});
const eye1Mesh = new THREE.Mesh(eye1, eye1Material);
eye1Mesh.position.set(-0.25, 1.1, 0.25);
model.add(eye1Mesh);

const eye2 = new THREE.SphereGeometry(0.1, 32, 32);
const eye2Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0xFFFFFF
});
const eye2Mesh = new THREE.Mesh(eye2, eye2Material);
eye2Mesh.position.set(0.25, 1.1, 0.25);
model.add(eye2Mesh);

// Neck
const neck = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 32);
const neckMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x444444
});
const neckMesh = new THREE.Mesh(neck, neckMaterial);
neckMesh.position.set(0, 1.2, 0);
model.add(neckMesh);

// Shoulders
const shoulder1 = new THREE.BoxGeometry(0.2, 0.1, 0.2);
const shoulder1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const shoulder1Mesh = new THREE.Mesh(shoulder1, shoulder1Material);
shoulder1Mesh.position.set(-0.3, 0.5, 0.3);
model.add(shoulder1Mesh);

const shoulder2 = new THREE.BoxGeometry(0.2, 0.1, 0.2);
const shoulder2Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const shoulder2Mesh = new THREE.Mesh(shoulder2, shoulder2Material);
shoulder2Mesh.position.set(0.3, 0.5, 0.3);
model.add(shoulder2Mesh);

// Arms
const arm1 = new THREE.BoxGeometry(0.2, 0.2, 0.8);
const arm1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x444444
});
const arm1Mesh = new THREE.Mesh(arm1, arm1Material);
arm1Mesh.position.set(-0.5, 0.4, 0);
model.add(arm1Mesh);

const arm2 = new THREE.BoxGeometry(0.2, 0.2, 0.8);
const arm2Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x444444
});
const arm2Mesh = new THREE.Mesh(arm2, arm2Material);
arm2Mesh.position.set(0.5, 0.4, 0);
model.add(arm2Mesh);

// Hands
const hand1 = new THREE.BoxGeometry(0.1, 0.1, 0.2);
const hand1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const hand1Mesh = new THREE.Mesh(hand1, hand1Material);
hand1Mesh.position.set(-0.7, 0.1, 0.2);
model.add(hand1Mesh);

const hand2 = new THREE.BoxGeometry(0.1, 0.1, 0.2);
const hand2Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const hand2Mesh = new THREE.Mesh(hand2, hand2Material);
hand2Mesh.position.set(0.7, 0.1, 0.2);
model.add(hand2Mesh);

// Legs
const leg1 = new THREE.BoxGeometry(0.2, 0.2, 0.8);
const leg1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x444444
});
const leg1Mesh = new THREE.Mesh(leg1, leg1Material);
leg1Mesh.position.set(-0.5, -0.4, 0);
model.add(leg1Mesh);

const leg2 = new THREE.BoxGeometry(0.2, 0.2, 0.8);
const leg2Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x444444
});
const leg2Mesh = new THREE.Mesh(leg2, leg2Material);
leg2Mesh.position.set(0.5, -0.4, 0);
model.add(leg2Mesh);

// Joints
const joint1 = new THREE.SphereGeometry(0.05, 32, 32);
const joint1Material = new THREE.MeshStandardMaterial({
  metalness: 0.8,
  roughness: 0.2,
  color: 0x666666
});
const joint1Mesh = new THREE.Mesh(joint1, joint1Material);
joint1Mesh.position.set(-0.7, 0.1, 0.2);
model.add(joint1Mesh);

const joint2 = new THREE.SphereGeometry(0.05
} catch(e) {
  console.error('[G.I.L. STUDIO] Model generation error:', e);
  model = new THREE.Group();
  model.add(new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.2, 2),
    new THREE.MeshStandardMaterial({ color: 0x0044aa, metalness: 0.7, roughness: 0.3 })
  ));
  scene.add(model);
}

// ── Shadow pass ───────────────────────────────────────────────────────────────
if (model) {
  model.traverse(c => { if(c.isMesh) { c.castShadow=true; c.receiveShadow=true; } });
  if (!scene.children.includes(model)) scene.add(model);
}

// ── Bloom post-processing (graceful fallback) ─────────────────────────────────
let composer = null;
let useComposer = false;
try {
  composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.4, 0.6
  );
  composer.addPass(bloom);
  useComposer = true;
} catch(e) {
  console.warn('[G.I.L. STUDIO] Bloom unavailable, using direct renderer:', e);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
});

// ── Animate ───────────────────────────────────────────────────────────────────
let rotating = true;
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;
  fill.intensity = 3.5 + Math.sin(t) * 0.8;
  rim.intensity  = 2.5 + Math.sin(t*1.3) * 0.5;
  controls.update();
  try {
    if (useComposer) { composer.render(); } else { renderer.render(scene, camera); }
  } catch(e) {
    useComposer = false;
    renderer.render(scene, camera);
  }
}
animate();

// ── Controls ──────────────────────────────────────────────────────────────────
let wireframeOn = false;
function toggleWireframe() {
  wireframeOn = !wireframeOn;
  if (model) model.traverse(c => {
    if (c.isMesh) c.material.wireframe = wireframeOn;
  });
}
function toggleRotation() {
  rotating = !rotating;
  controls.autoRotate = rotating;
}
function downloadPNG() {
  composer.render();
  const link = document.createElement('a');
  link.download = 'GIL_3D_cyberpunk_futuristic_2026-04-23.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
