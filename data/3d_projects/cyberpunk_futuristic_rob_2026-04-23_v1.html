}

#variant-label {
  position:fixed; top:100px; right:30px;
  font-size:10px; color:rgba(0,191,255,0.3); text-align:right; letter-spacing:2px;
}
#error-msg {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);

<body>

<div id="hud">

<script>
(function() {
  'use strict';

  // ── Scene ──────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020208);
  scene.fog = new THREE.FogExp2(0x020208, 0.025);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
  camera.position.set(0, 1.5, 6);

  const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  // ── Controls ───────────────────────────────────────────────────────────────
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.4;
  controls.minDistance = 1.5;
  controls.maxDistance = 20;

  // ── Lighting ───────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x0a1a3a, 2.5));

  const key = new THREE.DirectionalLight(0x4488ff, 3.5);
  key.position.set(5, 8, 5);
  key.castShadow = true;
  key.shadow.mapSize.setScalar(2048);
  scene.add(key);

  const fill = new THREE.PointLight(0x00bfff, 4, 20);
  fill.position.set(-4, 2, -3);
  scene.add(fill);

  const rim = new THREE.PointLight(0x0044ff, 3, 15);
  rim.position.set(0, -3, -5);
  scene.add(rim);

  scene.add(new THREE.PointLight(0x88ccff, 2, 12)).position.set(0, 8, 0);

  // ── Grid & ground ─────────────────────────────────────────────────────────
  const grid = new THREE.GridHelper(20, 40, 0x0a1a3a, 0x050d1a);
  grid.position.y = -2.5;
  scene.add(grid);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),

  );
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -2.51;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Particle field ─────────────────────────────────────────────────────────
  const pGeo = new THREE.BufferGeometry();
  const pN = 1200, pPos = new Float32Array(pN * 3);
  for (let i = 0; i < pN; i++) {
    pPos[i*3]   = (Math.random()-0.5)*50;
    pPos[i*3+1] = (Math.random()-0.5)*50;
    pPos[i*3+2] = (Math.random()-0.5)*50;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color:0x112244, size:0.07, transparent:true, opacity:0.6 })));

  // ── AI-generated model ────────────────────────────────────────────────────
  let model = null;
  try {
    const model = new THREE.Group();

// Body
const bodyGeom = new THREE.BoxGeometry(1.5, 1.2, 0.8);
const bodyMat = new THREE.MeshStandardMaterial({

  roughness: 0.3,
  color: 0x333333
});
const body = new THREE.Mesh(bodyGeom, bodyMat);
body.position.set(0, 0.6, 0);
model.add(body);

// Head
const headGeom = new THREE.SphereGeometry(0.4, 32, 16);
const headMat = new THREE.MeshStandardMaterial({

  color: 0x333333
});

head.position.set(0, 1.2, 0);
model.add(head);

// Left Arm
const armGeom = new THREE.CylinderGeometry(0.1, 0.1, 1, 32);
const armMat = new THREE.MeshStandardMaterial({
  metalness: 0.7,
  roughness: 0.3,
  color: 0x333333
});
const arm = new THREE.Mesh(armGeom, armMat);
arm.position.set(-0.5, 0.6, 0);
model.add(arm);

const forearmGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 32);
const forearmMat = new THREE.MeshStandardMaterial({

  color: 0x333333
});
const forearm = new THREE.Mesh(forearmGeom, forearmMat);
forearm.position.set(-0.5, 0.8, 0);
model.add(forearm);

  color: 0x333333
});
const hand = new THREE.Mesh(handGeom, handMat);
hand.position.set(-0.5, 1.0, 0);
model.add(hand);

// Right Arm
const arm2Geom = new THREE.CylinderGeometry(0.1, 0.1, 1, 32);
const arm2Mat = new THREE.MeshStandardMaterial({
  metalness: 0.7,

  color: 0x333333
});
const arm2 = new THREE.Mesh(arm2Geom, arm2Mat);
arm2.position.set(0.5, 0.6, 0);
model.add(arm2);

const forearm2Geom = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 32);
const forearm2Mat = new THREE.MeshStandardMaterial({
  metalness: 0.7,

});
const forearm2 = new THREE.Mesh(forearm2Geom, forearm2Mat);
forearm2.position.set(0.5, 0.8, 0);
model.add(forearm2);

const hand2Mat = new THREE.MeshStandardMaterial({

});
const hand2 = new THREE.Mesh(hand2Geom, hand2Mat);
hand2.position.set(0.5, 1.0, 0);
model.add(hand2);

// Left Leg
const legGeom = new THREE.CylinderGeometry(0.1, 0.1, 1, 32);
const legMat = new THREE.MeshStandardMaterial({

  color: 0x333333
});
const leg = new THREE.Mesh(legGeom, legMat);
leg.position.set(-0.5, -0.4, 0);
model.add(leg);

const kneeGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 32);
const kneeMat = new THREE.MeshStandardMaterial({
  metalness: 0.7,

});
const knee = new THREE.Mesh(kneeGeom, kneeMat);
knee.position.set(-0.5, -0.2, 0);
model.add(knee);

const footGeom = new THREE.SphereGeometry(0.1, 32, 16);
const footMat = new THREE.MeshStandardMaterial({

const foot = new THREE.Mesh(footGeom, footMat);
foot.position.set(-0.5, -0.5, 0);
model.add(foot);

// Right Leg
const leg2Geom = new THREE.CylinderGeometry(0.1, 0.1, 1, 32);

});

const knee2Geom = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 32);
const knee2Mat = new THREE.MeshStandardMaterial({

});
const knee2 = new THREE.Mesh(knee2Geom, knee2Mat);
knee2.position.set(0.5, -0.2, 0);
model.add(knee2);

const foot2Geom = new THREE.SphereGeometry(0.1, 32, 16);
const foot2Mat = new THREE.MeshStandardMaterial({
  metalness: 0.7,
  roughness: 0.3,
  color: 0x333333
});
const foot2 = new THREE.Mesh(foot2Geom, foot2Mat);
foot2.position.set(0.5, -0.5, 0);
model.add(foot2);

// Joints
const jointMat = new THREE.MeshStandardMaterial({
  metalness: 0.9,
  roughness: 0.1,
  color: 0xFFFFFF
});

const joint1 = new THREE.SphereGeometry(0.05, 32, 16);
const joint = new THREE.Mesh(joint1, jointMat);
joint.position.set(-0.5, 0.8, 0);
model.add(joint);

const joint2 = new THREE.SphereGeometry(0.05, 32, 16);
const joint2Mesh = new THREE.Mesh(joint2, jointMat);
joint2Mesh.position.set(0.5, 0.8, 0);
model.add(joint2Mesh);

const joint3 = new THREE.SphereGeometry(0.05, 32, 16);
const joint3Mesh = new THREE.Mesh(joint3, jointMat);
joint3Mesh.position.set(-0.5, -0.2, 0);
model.add(joint3Mesh);

const joint4 = new THREE.SphereGeometry(0.05, 32, 16);
const joint4Mesh = new THREE.Mesh(joint4, jointMat);
joint4Mesh.position.set(0.5, -0.2, 0);
model.add(joint4Mesh);
    if (model) {
      model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
      if (!scene.children.includes(model)) scene.add(model);
    }
  } catch(err) {
    console.error('[G.I.L. STUDIO] Model error:', err);
    model = new THREE.Group();
    model.add(new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.2, 2),
      new THREE.MeshStandardMaterial({ color:0x0044aa, metalness:0.7, roughness:0.3 })
    ));
    scene.add(model);
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'MODEL GENERATION ERROR — SHOWING FALLBACK';
  }

  // ── Resize ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ── Animation loop ─────────────────────────────────────────────────────────
  let t = 0, rotating = true;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.01;
    fill.intensity = 3.5 + Math.sin(t) * 0.8;
    rim.intensity  = 2.5 + Math.sin(t * 1.3) * 0.5;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── Button actions ─────────────────────────────────────────────────────────
  let wireframeOn = false;
  window.toggleWireframe = function() {
    wireframeOn = !wireframeOn;
    if (model) model.traverse(c => { if (c.isMesh) c.material.wireframe = wireframeOn; });
  };
  window.toggleRotation = function() {
    rotating = !rotating;
    controls.autoRotate = rotating;
  };
  window.downloadPNG = function() {
    renderer.render(scene, camera);
    const link = document.createElement('a');
    link.download = 'GIL_3D_cyberpunk_futuristic_rob_2026-04-23.png';
    link.href = renderer.domElement.toDataURL('image/png');
    link.click();
  };
})();
</script>
</body>
</html>
