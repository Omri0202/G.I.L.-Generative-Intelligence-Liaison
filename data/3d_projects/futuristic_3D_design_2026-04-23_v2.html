<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G.I.L. — 3D Studio · Futuristic 3D Design Of A Guy Dodging Bullets In A Neon-Lit Environment With Metallic Armor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: radial-gradient(ellipse at center, #050510 0%, #020208 100%);
  overflow: hidden; font-family: 'Courier New', monospace; color:#fff;
}
canvas { display:block; }
#hud {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; flex-direction:column; align-items:center; pointer-events:none;
}
#title-bar {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:14px 28px; background:rgba(3,3,15,0.85);
  border-bottom:1px solid rgba(0,191,255,0.12);
}
#app-name {
  font-size:16px; font-weight:bold; letter-spacing:8px;
  color:#00BFFF; text-shadow:0 0 20px #00BFFF88;
}
#shape-label {
  font-size:22px; font-weight:bold; letter-spacing:5px; text-transform:uppercase;
  color:#00BFFF; text-shadow:0 0 40px #00BFFF;
  margin-top:20px;
}
#formula {
  margin-top:8px; font-size:12px; letter-spacing:2px;
  color:rgba(0,191,255,0.4); text-align:center;
}
#controls {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; gap:14px; z-index:10;
}
.btn {
  padding:10px 22px; border:1px solid rgba(0,191,255,0.35);
  background:rgba(0,10,20,0.8); color:#00BFFF;
  font-family:'Courier New',monospace; font-size:11px; font-weight:bold;
  letter-spacing:2px; cursor:pointer; border-radius:4px;
  transition:all 0.2s;
}
.btn:hover {
  background:rgba(0,191,255,0.15); box-shadow:0 0 20px rgba(0,191,255,0.3);
}
#hint {
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.1);
  text-transform:uppercase;
}
#variant-label {
  position:fixed; top:100px; right:30px;
  font-size:10px; color:rgba(0,191,255,0.3); text-align:right; letter-spacing:2px;
}
</style>
</head>
<body>

<div id="hud">
  <div id="title-bar">
    <span id="app-name">G . I . L .  —  3D STUDIO</span>
    <span style="color:rgba(0,191,255,0.3);font-size:10px;letter-spacing:3px">2026-04-23</span>
  </div>
  <div id="shape-label">Futuristic 3D Design Of A Guy Dodging Bullets In A Neon-Lit Environment With Metallic Armor</div>
  <div id="formula">Design variant 2  ·  AI generated by G.I.L.</div>
</div>

<div id="variant-label">DESIGN VARIANT<br>2 / 3</div>

<div id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-click to pan</div>
<div id="controls">
  <button class="btn" onclick="downloadPNG()">⬇  SAVE PNG</button>
  <button class="btn" onclick="toggleWireframe()">◈  WIREFRAME</button>
  <button class="btn" onclick="toggleRotation()">↻  PAUSE</button>
  <button class="btn" onclick="window.close()">✕  CLOSE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = null;
scene.fog = new THREE.FogExp2(0x020208, 0.028);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 1.4, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, preserveDrawingBuffer:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.autoRotate = true; controls.autoRotateSpeed = 1.4;
controls.minDistance = 1.5; controls.maxDistance = 18;

// ── Lighting ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x0a1a3a, 2.5);
scene.add(ambient);

const key = new THREE.DirectionalLight(0x4488ff, 3.5);
key.position.set(5, 8, 5); key.castShadow = true;
key.shadow.mapSize.setScalar(2048);
scene.add(key);

const fill = new THREE.PointLight(0x00bfff, 4, 20);
fill.position.set(-4, 2, -3);
scene.add(fill);

const rim = new THREE.PointLight(0x0044ff, 3, 15);
rim.position.set(0, -3, -5);
scene.add(rim);

const top = new THREE.PointLight(0x88ccff, 2, 12);
top.position.set(0, 8, 0);
scene.add(top);

// ── Grid ──────────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(16, 32, 0x0a1a3a, 0x050d1a);
grid.position.y = -2.2;
scene.add(grid);

// ── Ground reflection plane ───────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(16, 16);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x020510, metalness: 0.8, roughness: 0.2,
  transparent: true, opacity: 0.6
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -2.21;
ground.receiveShadow = true;
scene.add(ground);

// ── Particle field ────────────────────────────────────────────────────────────
const pGeo = new THREE.BufferGeometry();
const pN = 1200;
const pPos = new Float32Array(pN*3);
for (let i=0; i<pN; i++) {
  pPos[i*3]   = (Math.random()-0.5)*40;
  pPos[i*3+1] = (Math.random()-0.5)*40;
  pPos[i*3+2] = (Math.random()-0.5)*40;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
const pMat = new THREE.PointsMaterial({color:0x112244, size:0.06, transparent:true, opacity:0.7});
scene.add(new THREE.Points(pGeo, pMat));

// ── 3D Model (AI generated) ───────────────────────────────────────────────────
const model = new THREE.Group();

// Body
const body = new THREE.BoxGeometry(0.5, 1.5, 0.5);
const bodyMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xffffff
});
const bodyMesh = new THREE.Mesh(body, bodyMaterial);
model.add(bodyMesh);

// Helmet
const helmet = new THREE.ConeGeometry(0.2, 0.5, 16);
const helmetMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.7,
  roughness: 0.1,
  color: 0xffffff
});
const helmetMesh = new THREE.Mesh(helmet, helmetMaterial);
helmetMesh.position.set(0, 2.2, 0);
model.add(helmetMesh);

// Visor
const visor = new THREE.PlaneGeometry(0.2, 0.2);
const visorMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.7,
  roughness: 0.1,
  color: 0xff0000
});
const visorMesh = new THREE.Mesh(visor, visorMaterial);
visorMesh.position.set(0, 2.4, 0);
visorMesh.rotation.x = -Math.PI / 4;
model.add(visorMesh);

// Chest Plate
const chestPlate = new THREE.BoxGeometry(0.4, 0.4, 0.1);
const chestPlateMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xff9900
});
const chestPlateMesh = new THREE.Mesh(chestPlate, chestPlateMaterial);
chestPlateMesh.position.set(0, 1.5, 0);
model.add(chestPlateMesh);

// Shoulder Pads
const shoulderPad = new THREE.CylinderGeometry(0.1, 0.1, 0.2, 16);
const shoulderPadMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0x00ff00
});
const shoulderPadMesh = new THREE.Mesh(shoulderPad, shoulderPadMaterial);
shoulderPadMesh.position.set(0.2, 1.2, 0);
model.add(shoulderPadMesh);
const shoulderPadMesh2 = shoulderPadMesh.clone();
shoulderPadMesh2.position.set(-0.2, 1.2, 0);
model.add(shoulderPadMesh2);

// Armors
const armor = new THREE.TorusGeometry(0.05, 0.01, 16, 64);
const armorMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0x0000ff
});
const armorMesh = new THREE.Mesh(armor, armorMaterial);
armorMesh.position.set(0.2, 1.8, 0);
model.add(armorMesh);
const armorMesh2 = armorMesh.clone();
armorMesh2.position.set(-0.2, 1.8, 0);
model.add(armorMesh2);

// Guns
const gun = new THREE.BoxGeometry(0.1, 0.2, 0.1);
const gunMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xffffff
});
const gunMesh = new THREE.Mesh(gun, gunMaterial);
gunMesh.position.set(0.4, 1.2, 0);
model.add(gunMesh);

// Bullets
const bullet = new THREE.SphereGeometry(0.01, 16, 16);
const bulletMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xff0000
});
const bulletMesh = new THREE.Mesh(bullet, bulletMaterial);
bulletMesh.position.set(0.5, 1.5, 0);
model.add(bulletMesh);

// Legs
const leg = new THREE.BoxGeometry(0.1, 0.5, 0.1);
const legMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xffffff
});
const legMesh = new THREE.Mesh(leg, legMaterial);
legMesh.position.set(0, 0.5, 0);
model.add(legMesh);
const legMesh2 = legMesh.clone();
legMesh2.position.set(0, 0.5, -0.2);
model.add(legMesh2);

// Feet
const foot = new THREE.CylinderGeometry(0.05, 0.05, 0.1, 16);
const footMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xff9900
});
const footMesh = new THREE.Mesh(foot, footMaterial);
footMesh.position.set(0, 0, 0);
model.add(footMesh);
const footMesh2 = footMesh.clone();
footMesh2.position.set(0, 0, -0.2);
model.add(footMesh2);

// Head
const head = new THREE.IcosahedronGeometry(0.2, 4);
const headMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0xffffff
});
const headMesh = new THREE.Mesh(head, headMaterial);
headMesh.position.set(0, 2.5, 0);
model.add(headMesh);

// Eyes
const eye = new THREE.SphereGeometry(0.01, 16, 16);
const eyeMaterial = new THREE.MeshStandardMaterial({
  metalness: 0.5,
  roughness: 0.1,
  color: 0x0000ff
});
const eyeMesh = new THREE.Mesh(eye, eyeMaterial);
eyeMesh.position.set(0.1, 2.6, 0);
model.add(eyeMesh);
const eyeMesh2 = eyeMesh.clone();
eyeMesh2.position.set(-0.1, 2.6, 0);
model.add(eyeMesh2);

scene.add(model);

// ── Shadow ────────────────────────────────────────────────────────────────────
if (model) {
  model.traverse(c => { if(c.isMesh) { c.castShadow=true; c.receiveShadow=true; } });
  scene.add(model);
}

// ── Bloom post-processing ─────────────────────────────────────────────────────
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.4, 0.6
);
composer.addPass(bloom);

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ── Animate ───────────────────────────────────────────────────────────────────
let rotating = true;
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;
  fill.intensity = 3.5 + Math.sin(t) * 0.8;
  rim.intensity  = 2.5 + Math.sin(t*1.3) * 0.5;
  controls.update();
  composer.render();
}
animate();

// ── Controls ──────────────────────────────────────────────────────────────────
let wireframeOn = false;
function toggleWireframe() {
  wireframeOn = !wireframeOn;
  if (model) model.traverse(c => {
    if (c.isMesh) c.material.wireframe = wireframeOn;
  });
}
function toggleRotation() {
  rotating = !rotating;
  controls.autoRotate = rotating;
}
function downloadPNG() {
  composer.render();
  const link = document.createElement('a');
  link.download = 'GIL_3D_futuristic_3D_design_2026-04-23.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
