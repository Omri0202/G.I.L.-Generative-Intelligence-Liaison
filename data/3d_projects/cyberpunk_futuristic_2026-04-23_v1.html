<style>

<script>
// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 1.4, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, preserveDrawingBuffer:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.autoRotate = true; controls.autoRotateSpeed = 1.4;
controls.minDistance = 1.5; controls.maxDistance = 18;

// ── Lighting ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x0a1a3a, 2.5);

const leftArmJoint2 = new THREE.SphereGeometry(0.05, 32, 32);

const leftArmEnd = new THREE.ConeGeometry(0.05, 0.1, 16);

const rightLegJoint2Mesh = new THREE.Mesh(rightLegJoint2, rightLegJoint2Material);
rightLegJoint1Mesh.add(rightLegJoint2Mesh);

const rightLegEnd = new THREE.ConeGeometry(0.025, 0.05, 16);
const rightLegEndMaterial = new THREE.MeshStandardMaterial({ metalness: 0.7, roughness: 0.4, color: 0x00ff00 });
const rightLegEndMesh = new THREE.Mesh(rightLegEnd, rightLegEndMaterial);
rightLegJoint2Mesh.add(rightLegEndMesh);

rightLeg.position.x = 0.5;
rightLeg.position.y = -0.2;
rightLeg.position.z = 0;
bodyMesh.add(rightLeg);

const head = new THREE.Group();
const headBase = new THREE.SphereGeometry(0.2, 32, 32);
const headBaseMaterial = new THREE.MeshStandardMaterial({ metalness: 0.7, roughness: 0.4, color: 0x4c5154 });
const headBaseMesh = new THREE.Mesh(headBase, headBaseMaterial);
head.add(headBaseMesh);

const headJoint = new THREE.SphereGeometry(0.05, 32, 32);
const headJointMaterial = new THREE.MeshStandardMaterial({ metalness: 0.7, roughness: 0.4, color: 0x00ff00 });
const headJointMesh = new THREE.Mesh(headJoint, headJointMaterial);
headBaseMesh.add(headJointMesh);

head.position.y = 0.8;
bodyMesh.add(head);

const visorMaterial
} catch(e) {
  console.error('[G.I.L. STUDIO] Model generation error:', e);
  model = new THREE.Group();
  model.add(new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.2, 2),
    new THREE.MeshStandardMaterial({ color: 0x0044aa, metalness: 0.7, roughness: 0.3 })
  ));
  scene.add(model);
}

// ── Shadow pass ───────────────────────────────────────────────────────────────
if (model) {
  model.traverse(c => { if(c.isMesh) { c.castShadow=true; c.receiveShadow=true; } });
  if (!scene.children.includes(model)) scene.add(model);
}

// ── Bloom post-processing (graceful fallback) ─────────────────────────────────
let composer = null;
let useComposer = false;
try {
  composer = new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene, camera));
  const bloom = new THREE.UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.4, 0.6
  );
  composer.addPass(bloom);
  useComposer = true;
} catch(e) {
  console.warn('[G.I.L. STUDIO] Bloom unavailable, using direct renderer:', e);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
});

// ── Animate ───────────────────────────────────────────────────────────────────
let rotating = true;
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;
  fill.intensity = 3.5 + Math.sin(t) * 0.8;
  rim.intensity  = 2.5 + Math.sin(t*1.3) * 0.5;
  controls.update();
  try {
    if (useComposer) { composer.render(); } else { renderer.render(scene, camera); }
  } catch(e) {
    useComposer = false;
    renderer.render(scene, camera);
  }
}
animate();

// ── Controls ──────────────────────────────────────────────────────────────────
let wireframeOn = false;
function toggleWireframe() {
  wireframeOn = !wireframeOn;
  if (model) model.traverse(c => {
    if (c.isMesh) c.material.wireframe = wireframeOn;
  });
}
function toggleRotation() {
  rotating = !rotating;
  controls.autoRotate = rotating;
}
function downloadPNG() {
  composer.render();
  const link = document.createElement('a');
  link.download = 'GIL_3D_cyberpunk_futuristic_2026-04-23.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
}
</script>
