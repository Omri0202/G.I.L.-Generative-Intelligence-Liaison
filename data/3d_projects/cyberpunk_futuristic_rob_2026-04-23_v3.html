<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G.I.L. — 3D Studio · Cyberpunk Futuristic Robot With Glowing Joints And Armor Plating</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#020208;
  overflow:hidden; font-family:'Courier New',monospace; color:#fff;
}
canvas { display:block; }
#hud {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; flex-direction:column; align-items:center; pointer-events:none;
}
#title-bar {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  padding:14px 28px; background:rgba(3,3,15,0.90);
  border-bottom:1px solid rgba(0,191,255,0.15);
}
#app-name {
  font-size:16px; font-weight:bold; letter-spacing:8px;
  color:#00BFFF; text-shadow:0 0 20px #00BFFF88;
}
#shape-label {
  font-size:20px; font-weight:bold; letter-spacing:5px; text-transform:uppercase;
  color:#00BFFF; text-shadow:0 0 30px #00BFFF;
  margin-top:18px; text-align:center; padding:0 40px;
}
#formula {
  margin-top:6px; font-size:11px; letter-spacing:2px;
  color:rgba(0,191,255,0.4); text-align:center;
}
#controls {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; gap:14px; z-index:10;
}
.btn {
  padding:10px 22px; border:1px solid rgba(0,191,255,0.35);
  background:rgba(0,10,20,0.85); color:#00BFFF;
  font-family:'Courier New',monospace; font-size:11px; font-weight:bold;
  letter-spacing:2px; cursor:pointer; border-radius:4px; transition:all 0.2s;
}
.btn:hover { background:rgba(0,191,255,0.15); box-shadow:0 0 20px rgba(0,191,255,0.3); }
#hint {
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.1); text-transform:uppercase;
}
#variant-label {
  position:fixed; top:100px; right:30px;
  font-size:10px; color:rgba(0,191,255,0.3); text-align:right; letter-spacing:2px;
}
#error-msg {
  display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#ff4444; font-size:13px; letter-spacing:2px; text-align:center;
}
</style>
</head>
<body>

<div id="hud">
  <div id="title-bar">
    <span id="app-name">G . I . L .  —  3D STUDIO</span>
    <span style="color:rgba(0,191,255,0.3);font-size:10px;letter-spacing:3px">2026-04-23</span>
  </div>
  <div id="shape-label">Cyberpunk Futuristic Robot With Glowing Joints And Armor Plating</div>
  <div id="formula">Design variant 3  ·  AI generated by G.I.L.</div>
</div>

<div id="variant-label">DESIGN VARIANT<br>3 / 3</div>
<div id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-click to pan</div>
<div id="controls">
  <button class="btn" onclick="downloadPNG()">⬇  SAVE PNG</button>
  <button class="btn" onclick="toggleWireframe()">◈  WIREFRAME</button>
  <button class="btn" onclick="toggleRotation()">↻  PAUSE</button>
  <button class="btn" onclick="window.close()">✕  CLOSE</button>
</div>
<div id="error-msg"></div>

<script src="file:///C:/Users/Omri/project_gil/data/vendor/three.min.js"></script>
<script src="file:///C:/Users/Omri/project_gil/data/vendor/OrbitControls.js"></script>
<script>
(function() {
  'use strict';

  // ── Scene ──────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020208);
  scene.fog = new THREE.FogExp2(0x020208, 0.025);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
  camera.position.set(0, 1.5, 6);

  const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  // ── Controls ───────────────────────────────────────────────────────────────
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.4;
  controls.minDistance = 1.5;
  controls.maxDistance = 20;

  // ── Lighting ───────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x0a1a3a, 2.5));

  const key = new THREE.DirectionalLight(0x4488ff, 3.5);
  key.position.set(5, 8, 5);
  key.castShadow = true;
  key.shadow.mapSize.setScalar(2048);
  scene.add(key);

  const fill = new THREE.PointLight(0x00bfff, 4, 20);
  fill.position.set(-4, 2, -3);
  scene.add(fill);

  const rim = new THREE.PointLight(0x0044ff, 3, 15);
  rim.position.set(0, -3, -5);
  scene.add(rim);

  scene.add(new THREE.PointLight(0x88ccff, 2, 12)).position.set(0, 8, 0);

  // ── Grid & ground ─────────────────────────────────────────────────────────
  const grid = new THREE.GridHelper(20, 40, 0x0a1a3a, 0x050d1a);
  grid.position.y = -2.5;
  scene.add(grid);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshStandardMaterial({ color:0x020510, metalness:0.8, roughness:0.2, transparent:true, opacity:0.5 })
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -2.51;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Particle field ─────────────────────────────────────────────────────────
  const pGeo = new THREE.BufferGeometry();
  const pN = 1200, pPos = new Float32Array(pN * 3);
  for (let i = 0; i < pN; i++) {
    pPos[i*3]   = (Math.random()-0.5)*50;
    pPos[i*3+1] = (Math.random()-0.5)*50;
    pPos[i*3+2] = (Math.random()-0.5)*50;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color:0x112244, size:0.07, transparent:true, opacity:0.6 })));

  // ── AI-generated model ────────────────────────────────────────────────────
  let model = null;
  try {
    const model = new THREE.Group();

// Body
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 1),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x333333,
  })
);
body.position.set(0, 0.75, 0);
model.add(body);

// Armor plating
const armorPlating = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 0.5, 0.5),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x444444,
  })
);
armorPlating.position.set(0, 1.25, 0);
model.add(armorPlating);

// Glowing joints
const joint = new THREE.Mesh(
  new THREE.SphereGeometry(0.1, 16, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x444444,
    emissive: 0x33CC33,
    emissiveIntensity: 1,
  })
);
joint.position.set(0.75, 1.25, 0);
model.add(joint);

// Head
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 32, 32),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x666666,
  })
);
head.position.set(0, 2.25, 0);
model.add(head);

// Head armor
const headArmor = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 32, 32),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x777777,
  })
);
headArmor.position.set(0, 2.25, 0);
headArmor.rotation.y = Math.PI / 4;
model.add(headArmor);

// Left arm
const leftArm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.1, 0.1, 1.5, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
  })
);
leftArm.position.set(-0.75, 1.25, 0);
model.add(leftArm);

// Left arm joint
const leftJoint = new THREE.Mesh(
  new THREE.SphereGeometry(0.1, 16, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
    emissive: 0x33CC33,
    emissiveIntensity: 1,
  })
);
leftJoint.position.set(-0.75, 1.25, 0);
model.add(leftJoint);

// Right arm
const rightArm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.1, 0.1, 1.5, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
  })
);
rightArm.position.set(0.75, 1.25, 0);
model.add(rightArm);

// Right arm joint
const rightJoint = new THREE.Mesh(
  new THREE.SphereGeometry(0.1, 16, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
    emissive: 0x33CC33,
    emissiveIntensity: 1,
  })
);
rightJoint.position.set(0.75, 1.25, 0);
model.add(rightJoint);

// Left leg
const leftLeg = new THREE.Mesh(
  new THREE.CylinderGeometry(0.1, 0.1, 1.5, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
  })
);
leftLeg.position.set(-0.75, -0.75, 0);
model.add(leftLeg);

// Left leg joint
const leftLegJoint = new THREE.Mesh(
  new THREE.SphereGeometry(0.1, 16, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
    emissive: 0x33CC33,
    emissiveIntensity: 1,
  })
);
leftLegJoint.position.set(-0.75, -0.75, 0);
model.add(leftLegJoint);

// Right leg
const rightLeg = new THREE.Mesh(
  new THREE.CylinderGeometry(0.1, 0.1, 1.5, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
  })
);
rightLeg.position.set(0.75, -0.75, 0);
model.add(rightLeg);

// Right leg joint
const rightLegJoint = new THREE.Mesh(
  new THREE.SphereGeometry(0.1, 16, 16),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x888888,
    emissive: 0x33CC33,
    emissiveIntensity: 1,
  })
);
rightLegJoint.position.set(0.75, -0.75, 0);
model.add(rightLegJoint);

// Torso details
const torsoDetail = new THREE.Mesh(
  new THREE.TorusGeometry(0.1, 0.05, 16, 64),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x999999,
  })
);
torsoDetail.position.set(0, 0.75, 0.25);
model.add(torsoDetail);

// Torso details 2
const torsoDetail2 = new THREE.Mesh(
  new THREE.TorusGeometry(0.1, 0.05, 16, 64),
  new THREE.MeshStandardMaterial({
    metalness: 0.8,
    roughness: 0.2,
    color: 0x999999,
  })
);
torsoDetail2.position.set(0, 0.75, -0.25);
model.add(torsoDetail2);
    if (model) {
      model.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
      if (!scene.children.includes(model)) scene.add(model);
    }
  } catch(err) {
    console.error('[G.I.L. STUDIO] Model error:', err);
    model = new THREE.Group();
    model.add(new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.2, 2),
      new THREE.MeshStandardMaterial({ color:0x0044aa, metalness:0.7, roughness:0.3 })
    ));
    scene.add(model);
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'MODEL GENERATION ERROR — SHOWING FALLBACK';
  }

  // ── Resize ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ── Animation loop ─────────────────────────────────────────────────────────
  let t = 0, rotating = true;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.01;
    fill.intensity = 3.5 + Math.sin(t) * 0.8;
    rim.intensity  = 2.5 + Math.sin(t * 1.3) * 0.5;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── Button actions ─────────────────────────────────────────────────────────
  let wireframeOn = false;
  window.toggleWireframe = function() {
    wireframeOn = !wireframeOn;
    if (model) model.traverse(c => { if (c.isMesh) c.material.wireframe = wireframeOn; });
  };
  window.toggleRotation = function() {
    rotating = !rotating;
    controls.autoRotate = rotating;
  };
  window.downloadPNG = function() {
    renderer.render(scene, camera);
    const link = document.createElement('a');
    link.download = 'GIL_3D_cyberpunk_futuristic_rob_2026-04-23.png';
    link.href = renderer.domElement.toDataURL('image/png');
    link.click();
  };
})();
</script>
</body>
</html>
